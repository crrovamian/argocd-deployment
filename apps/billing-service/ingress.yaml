apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: billing-service
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: billing.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: billing-service
            port:
              number: 80